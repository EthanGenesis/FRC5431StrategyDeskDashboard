app = "tbsb-dashboard-hot-plane"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile.hot-plane"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  HOSTNAME = "0.0.0.0"
  HOT_DATA_PLANE_MODE = "disabled"
  HOT_DATA_PLANE_PROXY_ROUTES = "false"
  HOT_CACHE_FRESH_SECONDS = "15"
  HOT_CACHE_STALE_SECONDS = "60"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 2
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 2048
